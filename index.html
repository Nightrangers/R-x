<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>R_x</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <h1>R_x</h1>
      </div>

      <button id="newChatButton" class="new-chat-button" type="button">New chat</button>
    </aside>

    <main class="chat-stage">
      <header class="chat-header">
        <div>
          <h2>Ask R_x anything</h2>
        </div>
      </header>

      <section id="messages" class="messages" aria-live="polite"></section>

      <form id="chatForm" class="composer">
        <label class="sr-only" for="messageInput">Message</label>
        <textarea id="messageInput" rows="1" placeholder="Message R_x..." maxlength="4000"></textarea>
        <div class="composer-actions">
          <p class="composer-hint">Enter to send. Shift+Enter for a new line.</p>
          <button id="sendButton" type="submit">Send</button>
        </div>
      </form>
    </main>
  </div>

  <template id="messageTemplate">
    <article class="message">
      <div class="message-role"></div>
      <div class="message-bubble"></div>
    </article>
  </template>

  <template id="imageTemplate">
    <article class="message" data-role="assistant">
      <div class="message-role">R_X</div>
      <div class="message-bubble image-bubble">
        <img class="generated-image" alt="Generated by R_x" />
      </div>
    </article>
  </template>

  <script src="./script.js"></script>
</body>
</html>
